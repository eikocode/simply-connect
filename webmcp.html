<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super-Contract — WebMCP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .msg-user    { background: #1e3a5f; border-radius: 12px 12px 4px 12px; }
    .msg-assistant{ background: #1f2937; border-radius: 12px 12px 12px 4px; }
    .tag-unconfirmed { color: #f59e0b; font-size: 0.7rem; font-style: italic; }
    .tag-captured    { color: #10b981; font-size: 0.7rem; }
    pre { white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-gray-900 border-b border-gray-800 px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <span class="text-2xl">📄</span>
      <div>
        <h1 class="text-lg font-bold text-white">Super-Contract</h1>
        <p class="text-xs text-gray-400">Contract assistant · WebMCP surface</p>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <span id="mcp-badge" class="text-xs px-2 py-1 rounded-full bg-gray-800 text-gray-400">
        Checking MCP…
      </span>
      <button
        onclick="loadStatus()"
        class="text-xs px-3 py-1 rounded bg-blue-700 hover:bg-blue-600 text-white"
      >↻ Status</button>
    </div>
  </header>

  <!-- Main -->
  <div class="flex flex-1 overflow-hidden">

    <!-- Sidebar: Context Health -->
    <aside class="w-72 bg-gray-900 border-r border-gray-800 flex flex-col overflow-hidden">
      <div class="px-4 py-3 border-b border-gray-800">
        <h2 class="text-sm font-semibold text-gray-300">Context Health</h2>
      </div>
      <div id="sidebar-content" class="flex-1 overflow-y-auto p-4 space-y-4 text-xs text-gray-400">
        <p class="italic">Click ↻ Status to load</p>
      </div>
    </aside>

    <!-- Chat -->
    <div class="flex-1 flex flex-col overflow-hidden">
      <div id="chat" class="flex-1 overflow-y-auto p-6 space-y-4"></div>

      <!-- Input -->
      <div class="border-t border-gray-800 bg-gray-900 px-4 py-3">
        <div class="flex gap-3 max-w-4xl mx-auto">
          <textarea
            id="input"
            rows="3"
            placeholder="Ask about contracts, draft clauses, or say 'remember that…' to capture context…"
            class="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-sm text-gray-100 resize-none focus:outline-none focus:border-blue-500"
            onkeydown="handleKey(event)"
          ></textarea>
          <button
            onclick="sendMessage()"
            class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg text-sm font-medium text-white self-end"
          >Send</button>
        </div>
        <p class="text-xs text-gray-600 mt-1 text-center">Ctrl+Enter to send</p>
      </div>
    </div>

  </div>

  <script>
  // ============================================================
  // MCP Tool Schemas
  // ============================================================
  const TOOL_SCHEMAS = [
    {
      name: "get_committed_context",
      description: "Read the committed (authoritative) context for this contract workspace.",
      inputSchema: {
        type: "object",
        properties: {
          category: {
            type: "string",
            description: "Optional filter: business | parties | preferences | contracts"
          }
        }
      }
    },
    {
      name: "get_staging_entries",
      description: "List staging entries — candidate context updates pending admin review.",
      inputSchema: {
        type: "object",
        properties: {
          status: {
            type: "string",
            description: "Filter: pending | approved | rejected | deferred"
          }
        }
      }
    },
    {
      name: "capture_to_staging",
      description: "Create a staging entry — a candidate context update for admin review.",
      inputSchema: {
        type: "object",
        properties: {
          summary:  { type: "string", description: "One-line summary (max 80 chars)" },
          content:  { type: "string", description: "Full content to store" },
          category: { type: "string", description: "business | parties | preferences | contracts | general" },
          source:   { type: "string", description: "Source identifier" }
        },
        required: ["summary", "content", "category"]
      }
    }
  ];

  // ============================================================
  // Tool executors — call the MCP HTTP server
  // ============================================================
  const MCP_URL = "http://localhost:3004";

  const EXECUTORS = {
    async get_committed_context({ category } = {}) {
      return callMcpTool("get_committed_context", category ? { category } : {});
    },
    async get_staging_entries({ status } = {}) {
      return callMcpTool("get_staging_entries", status ? { status } : {});
    },
    async capture_to_staging({ summary, content, category, source }) {
      return callMcpTool("capture_to_staging", { summary, content, category, source: source || "webmcp" });
    }
  };

  async function callMcpTool(name, args) {
    // Try direct HTTP to MCP server (SSE transport — use REST-compatible endpoint if available,
    // otherwise fall back to a simple JSON call pattern)
    const resp = await fetch(`${MCP_URL}/mcp/messages/`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        jsonrpc: "2.0",
        id: Date.now(),
        method: "tools/call",
        params: { name, arguments: args }
      })
    });
    if (!resp.ok) throw new Error(`MCP HTTP ${resp.status}`);
    const data = await resp.json();
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    return data.result;
  }

  // ============================================================
  // WebMCP registration (if browser supports it)
  // ============================================================
  const hasWebMCP = typeof navigator !== "undefined" && !!navigator.modelContext;

  if (hasWebMCP) {
    for (const schema of TOOL_SCHEMAS) {
      navigator.modelContext.registerTool({
        ...schema,
        execute: EXECUTORS[schema.name]
      });
    }
    setBadge("WebMCP active", "bg-green-800 text-green-300");
  } else {
    setBadge("MCP HTTP mode", "bg-blue-900 text-blue-300");
  }

  // ============================================================
  // Chat state
  // ============================================================
  const conversationHistory = [];

  // ============================================================
  // Status panel
  // ============================================================
  async function loadStatus() {
    const sidebar = document.getElementById("sidebar-content");
    sidebar.innerHTML = '<p class="italic text-gray-500">Loading…</p>';
    try {
      const ctx = await EXECUTORS.get_committed_context();
      const staging = await EXECUTORS.get_staging_entries({ status: "pending" });

      const committed = ctx?.content?.[0]?.text
        ? JSON.parse(ctx.content[0].text)
        : (ctx?.committed_context || {});

      const entries = staging?.content?.[0]?.text
        ? JSON.parse(staging.content[0].text)
        : staging;

      const stagedCount = entries?.count ?? entries?.staging_entries?.length ?? 0;

      let html = '<div class="space-y-3">';

      html += '<div><p class="text-gray-500 uppercase tracking-wide mb-1">Committed Context</p>';
      const files = committed?.committed_context || committed || {};
      for (const [name, content] of Object.entries(files)) {
        const size = typeof content === "string" ? content.length : 0;
        const icon = size > 100 ? "✓" : "○";
        const color = size > 100 ? "text-green-400" : "text-gray-600";
        html += `<div class="flex justify-between"><span class="${color}">${icon} ${name}</span><span class="text-gray-600">${size}c</span></div>`;
      }
      html += "</div>";

      html += `<div><p class="text-gray-500 uppercase tracking-wide mb-1">Staging</p>`;
      html += `<div class="flex justify-between"><span class="text-yellow-400">⏳ Pending</span><span class="font-mono">${stagedCount}</span></div>`;
      html += "</div>";

      html += `<div class="pt-2 border-t border-gray-800"><p class="text-gray-600">MCP: ${MCP_URL}</p></div>`;
      html += "</div>";

      sidebar.innerHTML = html;
    } catch (e) {
      sidebar.innerHTML = `<p class="text-red-400">Error: ${e.message}</p><p class="mt-2 text-gray-500">Is the MCP server running?<br><code>sc-mcp --http</code></p>`;
    }
  }

  // ============================================================
  // Chat
  // ============================================================
  async function sendMessage() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) return;

    input.value = "";
    appendMessage("user", text);
    conversationHistory.push({ role: "user", content: text });

    appendMessage("assistant", "⋯", "thinking");

    try {
      // Load committed context and staging to build the system context
      const [ctxResult, stagingResult] = await Promise.all([
        EXECUTORS.get_committed_context().catch(() => null),
        EXECUTORS.get_staging_entries({ status: "pending" }).catch(() => null)
      ]);

      const committedRaw = ctxResult?.content?.[0]?.text
        ? JSON.parse(ctxResult.content[0].text)
        : {};
      const stagingRaw = stagingResult?.content?.[0]?.text
        ? JSON.parse(stagingResult.content[0].text)
        : {};

      const committed = committedRaw?.committed_context || committedRaw || {};
      const stagingEntries = stagingRaw?.staging_entries || [];

      // Format context for display reply (client-side fallback — direct API not available in browser)
      // The WebMCP browser model handles this natively; we show a formatted response.
      if (hasWebMCP) {
        // WebMCP-capable browser — model has tools registered, it handles everything
        removeThinking();
        appendMessage("assistant", "✓ Message delivered to WebMCP model. Check your AI interface for the response.", "");
        return;
      }

      // Fallback: Show context summary and ask user to use Telegram or CLI for full responses
      removeThinking();

      const committedNames = Object.keys(committed);
      const populatedCount = committedNames.filter(k => (committed[k] || "").length > 100).length;
      const note = `[WebMCP fallback — no AI browser detected]\n\nContext loaded: ${populatedCount}/${committedNames.length} committed files populated, ${stagingEntries.length} pending staging entries.\n\nFor full AI responses, use:\n  • Telegram bot (sc-relay)\n  • CLI: sc\n\nYour message: "${text}"`;
      appendMessage("assistant", note, "fallback");

    } catch (e) {
      removeThinking();
      appendMessage("assistant", `Error: ${e.message}`, "error");
    }
  }

  // ============================================================
  // DOM helpers
  // ============================================================
  function appendMessage(role, text, cls) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = `flex ${role === "user" ? "justify-end" : "justify-start"}`;
    div.id = cls === "thinking" ? "thinking-bubble" : "";

    const bubble = document.createElement("div");
    bubble.className = `max-w-2xl px-4 py-3 text-sm leading-relaxed ${
      role === "user" ? "msg-user text-blue-100" : "msg-assistant text-gray-100"
    }`;
    bubble.innerHTML = formatText(text);

    div.appendChild(bubble);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeThinking() {
    const el = document.getElementById("thinking-bubble");
    if (el) el.remove();
  }

  function formatText(text) {
    return text
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/\*(note:.*?)\*/gi, '<span class="tag-unconfirmed">$1</span>')
      .replace(/Captured — pending admin review\./g, '<span class="tag-captured">✓ Captured — pending admin review.</span>')
      .replace(/\n/g, "<br>");
  }

  function setBadge(label, cls) {
    const badge = document.getElementById("mcp-badge");
    badge.textContent = label;
    badge.className = `text-xs px-2 py-1 rounded-full ${cls}`;
  }

  function handleKey(e) {
    if (e.key === "Enter" && e.ctrlKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  // ============================================================
  // Init
  // ============================================================
  document.addEventListener("DOMContentLoaded", () => {
    const chat = document.getElementById("chat");
    const intro = document.createElement("div");
    intro.className = "text-center text-gray-600 text-sm py-8";
    intro.innerHTML = `
      <p class="text-2xl mb-2">📄</p>
      <p class="font-medium text-gray-400">Super-Contract WebMCP</p>
      <p class="mt-1">Ask about contracts, draft clauses, or capture context for future sessions.</p>
      <p class="mt-3 text-xs">
        ${hasWebMCP
          ? '✓ WebMCP detected — tools registered with browser AI model'
          : '○ WebMCP not detected — using MCP HTTP fallback'}
      </p>
      <p class="mt-1 text-xs text-gray-700">MCP server: <code>${MCP_URL}</code> · <code>sc-mcp --http</code> to start</p>
    `;
    chat.appendChild(intro);

    // Auto-load status
    loadStatus();
  });
  </script>
</body>
</html>
